# master-brain routine schedule → generates TODOs into D1 (todos/ web app) on a cadence.
# every:    Nd | Nw | Nm  (days / weeks / months)
# last_run: YYYY-MM-DD     (blank = treat as due now)
# Pair with: /schedule → /mb:todos-routine (heartbeat) and /mb:todos-execute
# NOTE (nitokyo-brain): TODOs are emitted to Cloudflare D1, not *.md. See memory todos-in-d1.
client: "nitokyo.shop"
routines:
  - id: ads-audit
    every: 2w
    title: "Run /ads-google + /ads-budget for {client}; log findings as next actions"
    skill: claude-ads
    priority: high
    last_run: 2026-06-11
  - id: seo-refresh
    every: 1m
    title: "marketing-brain: re-run keyword/competitor research, decide next action for {client}"
    skill: marketing-brain
    priority: normal
    last_run: 2026-06-11
  - id: site-recrawl
    every: 3m
    title: "website-brain: re-crawl {client} and diff against the last capture"
    skill: website-brain
    priority: low
    last_run: 2026-06-11
  - id: client-report
    every: 3m
    title: "Refresh the fused client intelligence report for {client} (/mb:report)"
    skill: client-intelligence-report
    priority: normal
    last_run: 2026-06-11
  - id: backlog-review
    every: 2w
    title: "Triage the TODO backlog (/mb:todos-review)"
    skill: manual
    priority: normal
    last_run: 2026-06-11
  # --- added 2026-06-11: tied to the audit findings ---
  - id: ads-search-terms
    every: 1w
    title: "claude-ads: review {client} search terms — add negatives, harvest converting close-variants as keywords"
    skill: claude-ads
    priority: high
    last_run: 2026-06-11
  - id: conversion-tracking-check
    every: 1m
    title: "claude-ads: verify {client} conversion goals healthy (Contact goal, Enhanced Conversions, no broken actions)"
    skill: claude-ads
    priority: high
    last_run: 2026-06-11
  - id: rank-tracking
    every: 2w
    title: "marketing-brain: track {client} rankings for target keywords vs the greenfield baseline"
    skill: marketing-brain
    priority: normal
    last_run: 2026-06-11
  - id: content-publish
    every: 1m
    title: "marketing-brain: ship one BEAST-plan content piece for {client} (brand-sourcing page or authority article)"
    skill: marketing-brain
    priority: normal
    last_run: 2026-06-11
# Dropped from defaults: local-gbp (local-seo-brain) — nitokyo is global e-commerce/lead-gen,
# no Google Map Pack play. Add it back if you want a GBP for the Hiroshima entity.
