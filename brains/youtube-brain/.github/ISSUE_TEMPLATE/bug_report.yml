name: Bug report
description: Report a reproducible YouTube Brain issue
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not paste credentials, secrets, or private client data.
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
